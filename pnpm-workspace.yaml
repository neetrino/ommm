packages:
  - "apps/*"
  - "packages/database"

# Allow install lifecycle scripts only for these transitive deps (pnpm v10+).
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  argon2: true
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
